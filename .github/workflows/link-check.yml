name: Link check

# Advisory only — never blocks a deploy. Runs weekly (and on demand) to catch
# project links that rot while you're not looking (repo renames, dead demos,
# moved reports), and opens/updates a tracking issue when something breaks.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    name: Check project links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Check links
        id: check
        continue-on-error: true
        run: node scripts/check-links.mjs | tee link-report.txt
      - name: Open or update tracking issue
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Broken project links detected"
          report="$(cat link-report.txt)"
          body=$(printf 'The weekly link check found dead or renamed project links. Update the affected `links` in `content/projects/*.mdx`.\n\n```\n%s\n```' "$report")
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "🔗 $title" --body "$body"
          fi
